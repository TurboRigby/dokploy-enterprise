apiVersion: v1
kind: Namespace
metadata:
  name: dokploy-crack

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dokploy-crack
  namespace: dokploy-crack
  labels:
    app: dokploy-crack
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dokploy-crack
  template:
    metadata:
      labels:
        app: dokploy-crack
    spec:
      containers:
      - name: app
        image: ghcr.io/turborigby/dokploy-enterprise:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: PORT
          value: "3000"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: dokploy-crack
  namespace: dokploy-crack
  labels:
    app: dokploy-crack
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: dokploy-crack

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dokploy-crack
  namespace: dokploy-crack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dokploy-crack
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
